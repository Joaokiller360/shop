<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bienvenido</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; color: #222; }
    .container { background: #fff; padding: 32px; margin: 24px auto; border-radius: 8px; max-width: 600px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    h1 { color: #2d7aee; }
    .footer { margin-top: 32px; font-size: 13px; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <h1>¡Bienvenido, {{customerName}}!</h1>
    <p>Gracias por registrarte en nuestra tienda. Esperamos que disfrutes tu experiencia de compra.</p>
    <div class="footer">
      &copy; {{year}} Tu Tienda.
    </div>
  </div>
</body>
</html>
